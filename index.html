<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Local Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Add a new task..." class="todo-input">
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Active: <strong id="activeCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
        </div>

        <ul id="todoList" class="todo-list"></ul>
        <div class="empty-state" id="emptyState"><p>✨ No tasks yet. Add one to get started!</p></div>
        <button id="clearBtn" class="clear-btn">Clear Completed</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
